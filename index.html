<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Beyond Zero Racing 🏎️</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			background: #000;
		}

		canvas {
			display: block;
			touch-action: none;
		}

		#editor-link {
			position: absolute;
			bottom: 12px;
			right: 16px;
			color: #fff;
			font: 14px sans-serif;
			text-decoration: none;
			background: rgba(0, 0, 0, 0.5);
			padding: 8px 14px;
			border-radius: 6px;
			z-index: 10;
		}

		#editor-link:hover {
			background: rgba(0, 0, 0, 0.7);
		}

		@media (pointer: coarse) {
			#editor-link {
				bottom: auto;
				top: 12px;
				right: 12px;
			}
		}

		/* --- Loading screen ------------------------------------------- */

		#loading-screen {
			position: fixed;
			inset: 0;
			z-index: 1000;
			background: #1a1a2e;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			font-family: 'Segoe UI', system-ui, sans-serif;
			color: #fff;
			transition: opacity 0.4s ease;
		}

		#loading-screen.fade-out {
			opacity: 0;
			pointer-events: none;
		}

		/* Road surface */
		.loading-road {
			position: relative;
			width: 280px;
			height: 6px;
			background: #444;
			border-radius: 3px;
			margin-bottom: 32px;
			overflow: visible;
		}

		/* Dashed center line */
		.loading-road::before {
			content: '';
			position: absolute;
			top: 50%;
			left: 0;
			width: 100%;
			height: 2px;
			transform: translateY(-50%);
			background: repeating-linear-gradient(
				90deg,
				#f0c040 0px,
				#f0c040 12px,
				transparent 12px,
				transparent 24px
			);
			animation: road-scroll 0.8s linear infinite;
		}

		@keyframes road-scroll {
			0% { background-position: 0 0; }
			100% { background-position: 24px 0; }
		}

		/* Car emoji driving across */
		.loading-car {
			position: absolute;
			top: -22px;
			font-size: 24px;
			animation: car-drive 2.4s ease-in-out infinite;
		}

		@keyframes car-drive {
			0%   { left: -10%; }
			50%  { left: 85%; }
			51%  { transform: scaleX(-1); }
			100% { left: -10%; transform: scaleX(-1); }
		}

		/* Bounce effect */
		.loading-car::after {
			content: '';
			display: block;
			animation: car-bounce 0.3s ease-in-out infinite alternate;
		}

		@keyframes car-bounce {
			0%   { transform: translateY(0); }
			100% { transform: translateY(-3px); }
		}

		.loading-title {
			font-size: 22px;
			font-weight: 700;
			letter-spacing: 2px;
			margin-bottom: 8px;
			text-transform: uppercase;
			background: linear-gradient(90deg, #f0c040, #e84040, #f0c040);
			background-size: 200% 100%;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
			animation: shimmer 2s ease-in-out infinite;
		}

		@keyframes shimmer {
			0%   { background-position: -200% 0; }
			100% { background-position: 200% 0; }
		}

		.loading-subtitle {
			font-size: 13px;
			color: #888;
			letter-spacing: 1px;
		}

		/* Animated dots */
		.loading-dots::after {
			content: '';
			animation: dots 1.5s steps(4, end) infinite;
		}

		@keyframes dots {
			0%   { content: ''; }
			25%  { content: '.'; }
			50%  { content: '..'; }
			75%  { content: '...'; }
		}
	</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
			"crashcat": "https://esm.sh/crashcat@0.0.2",
			"peerjs": "https://esm.sh/peerjs@1.5.5"
		}
	}
	</script>

	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-HFNWYTFJRY"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		gtag('js', new Date());

		gtag('config', 'G-HFNWYTFJRY');
	</script>
</head>

<body>
	<div id="loading-screen">
		<div class="loading-title">Beyond Zero Racing</div>
		<div class="loading-road">
			<div class="loading-car">🏎️</div>
		</div>
		<div class="loading-subtitle">Loading<span class="loading-dots"></span></div>
	</div>
	<a id="editor-link" href="editor.html">Create your own track</a>
	<script>
		const map = new URLSearchParams(location.search).get('map');
		if (map) {
			const link = document.getElementById('editor-link');
			link.href = 'editor.html?map=' + map;
			link.textContent = 'Edit this track';
		}
	</script>
	<script type="module" src="js/main.js"></script>
</body>

</html>
